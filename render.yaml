services:
  - type: web
    name: vit-storage-svc
    runtime: docker # Changed to docker to use the fixed Dockerfile
    region: oregon
    plan: starter
    # No buildCommand/startCommand needed for Docker runtime usually,
    # but we can specify if needed. Render will use Dockerfile.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GDRIVE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DROPBOX_ACCESS_TOKEN
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
